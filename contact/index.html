<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Albert Hwang</title>
  <meta name="description" content="Get in touch with Albert Hwang — product, tutoring, or ceramics." />
  <link rel="icon" href="/images/favicon.ico" />
  <link rel="canonical" href="https://alberthwang.me/contact/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">Albert Hwang</a>
      <nav class="site-nav">
        <a href="/about/">About</a>
        <a href="/contact/" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container narrow">
      <h1>Contact</h1>
      <p>I am also available for tutoring opportunities either virtually or in-person in Oakland/Berkeley, California. Let me know below what you&rsquo;re looking for and I&rsquo;ll reach out to you.</p>

      <!-- Posts to Formspree (GitHub Pages has no backend). -->
      <form class="contact-form" action="https://formspree.io/f/xbdegvdr" method="POST">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="message">What are you looking for?</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn">Send</button>
      </form>

      <p class="contact-alt">
        You can also connect with me on <a href="https://www.linkedin.com/in/athwang/">LinkedIn</a>.
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; <span id="year">2026</span> Albert Hwang</span>
      <a href="#top">Back to top &uarr;</a>
    </div>
  </footer>

  <script src="/main.js"></script>
</body>
</html>
